<section class="destination">
  <div class="destination__container">
    <app-planets></app-planets>
    <ng-container [ngTemplateOutlet]="tabs"></ng-container>
  </div>
</section>

<ng-template #tabs>
  <section class="tabs">
    <nav class="tabs__list">
      <a
        class="tabs__item"
        *ngFor="let tab of listTabs; let i = index"
        (click)="onItemSelected(i)"
        [ngClass]="{ active__link: activeLink.id === tab.id }"
        >{{ tab.name }}</a
      >
    </nav>

    <article class="tabs__container">
      <div [ngSwitch]="">
        <p *ngSwitchCase="true"></p>
        <p *ngSwitchCase="false"></p>
        <p *ngSwitchDefault></p>
      </div>
    </article>
  </section>
</ng-template>
